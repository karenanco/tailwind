<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPA Estudio | Arquitectura y Especialidades</title>
  <script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = {
        theme: {
            extend: {
                height: {
                    'screen-v': '100vh', // Altura completa de la ventana
                },
                keyframes: {
                    parpadeo: {
                        '0%, 100%': { opacity: 1 },
                        '50%': { opacity: 0 },
                    },
                    subir: {
                        '0%': { transform: 'translateY(20px)', opacity: 0 },
                        '100%': { transform: 'translateY(0)', opacity: 1 },
                    }
                },
                animation: {
                    'parpadeo-lento': 'parpadeo 1.5s ease-in-out infinite',
                    'entrada-suave': 'subir 1s ease-out forwards',
                }
            }
        }
    }
</script>
</head>


<body class="bg-slate-50 text-slate-900 font-sans">

  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">
        
        <div class="text-2xl font-bold tracking-wider text-slate-800">
            SPA <span class="font-light">ESTUDIO</span>
        </div>

        <div class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-widest">
            <a href="#" class="hover:text-blue-600 transition">Portafolio</a>
            <a href="#" class="hover:text-blue-600 transition">Contacto</a>
        </div>

    </div>
  </nav>

  <section class="relative h-screen-v w-full overflow-hidden">
    
    <img src="https://images.unsplash.com/photo-1600607687939-ce8a6c25118c?q=80&w=2000&auto=format&fit=crop" 
         alt="Fondo Arquitectura" 
         class="absolute inset-0 w-full h-full object-cover z-0">

    <div class="absolute inset-0 bg-black/50 z-10"></div>

    <div class="relative z-20 h-full flex flex-col items-center justify-center text-center px-4 animate-entrada-suave">
        
        <img src="assets/img/spa.png" 
             alt="SPA Estudio Logo" 
             class="h-24 md:h-32 w-auto mb-10 mb-8 object-contain">

        <div class="bg-yellow-400 text-slate-900 p-6 md:p-8 rounded-xl shadow-lg animate-parpadeo-lento max-w-2xl mx-auto">
            
            <p class="text-lg md:text-xl font-medium opacity-90">
                Diseño de arquitectura y especialidades
            </p>
            
            <p class="text-lg md:text-xl font-medium opacity-90">
                de proyectos públicos y privados
            </p>

        </div>

    </div>
  </section>
  
</body>
</html>
