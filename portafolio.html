<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA Estudio | Portafolio por Proyectos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #modal-galeria {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #foto-grande {
            max-width: 90%;
            max-height: 75vh;
            object-fit: contain;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 4px;
        }

        .boton-nav {
            background: none;
            border: none;
            color: white;
            font-size: 4rem;
            cursor: pointer;
            padding: 20px;
            transition: all 0.3s;
            user-select: none;
        }

        .boton-nav:hover { color: #facc15; scale: 1.1; }

        /* Contador de fotos (1/5, 2/5...) */
        #contador {
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

    <nav class="bg-white p-6 shadow-sm text-center mb-10">
        <h1 class="text-2xl font-bold tracking-tighter text-slate-800">SPA <span class="font-light">ESTUDIO</span></h1>
    </nav>

    <div class="container mx-auto px-6 max-w-6xl">
        <div class="text-center mb-16">
            <h2 class="text-3xl font-light italic text-slate-900">Nuestras Obras</h2>
            <div class="w-12 h-1 bg-yellow-400 mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="group cursor-pointer relative overflow-hidden rounded-2xl shadow-lg aspect-square" onclick="abrirGaleria(0)">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=800" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                    <h3 class="text-white text-xl font-light tracking-widest uppercase">Casa Mirador</h3>
                </div>
            </div>

            <div class="group cursor-pointer relative overflow-hidden rounded-2xl shadow-lg aspect-square" onclick="abrirGaleria(3)">
                <img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                    <h3 class="text-white text-xl font-light tracking-widest uppercase">Edificio SPA</h3>
                </div>
            </div>

            <div class="group cursor-pointer relative overflow-hidden rounded-2xl shadow-lg aspect-square" onclick="abrirGaleria(5)">
                <img src="https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=800" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                    <h3 class="text-white text-xl font-light tracking-widest uppercase">Vivienda Social</h3>
                </div>
            </div>

        </div>
    </div>

    <div id="modal-galeria">
        <button onclick="cerrarGaleria()" class="absolute top-8 right-8 text-white text-5xl font-extralight hover:text-yellow-400">&times;</button>
        
        <div class="flex items-center justify-between w-full px-4 md:px-10">
            <button onclick="cambiarFoto(-1)" class="boton-nav">❮</button>
            
            <div class="flex flex-col items-center max-w-full">
                <img id="foto-grande" src="" alt="Cargando...">
                <p id="caption" class="text-white mt-6 tracking-[0.3em] uppercase font-light text-center"></p>
                <p id="contador"></p>
            </div>

            <button onclick="cambiarFoto(1)" class="boton-nav">❯</button>
        </div>
    </div>

    <script>
        // LISTA MAESTRA DE TODAS LAS FOTOS
        // Aquí pones todas: las visibles y las que quieres que aparezcan al navegar
        const fotos = [
            // PROYECTO 1: Casa Mirador (Fotos 0, 1, 2)
            { url: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1200", titulo: "Casa Mirador - Fachada" }, // 0
            { url: "https://images.unsplash.com/photo-1600607687920-4e2a09cf159d?q=80&w=1200", titulo: "Casa Mirador - Living" },  // 1 (Oculta)
            { url: "https://images.unsplash.com/photo-1600566753190-17f0bb2a6c3e?q=80&w=1200", titulo: "Casa Mirador - Terraza" }, // 2 (Oculta)

            // PROYECTO 2: Edificio SPA (Fotos 3, 4)
            { url: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=1200", titulo: "Edificio SPA - Acceso" }, // 3
            { url: "https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=1200", titulo: "Edificio SPA - Oficinas" }, // 4 (Oculta)

            // PROYECTO 3: Vivienda Social (Foto 5)
            { url: "https://images.unsplash.com/photo-1512917774080-9991f1c4c750?q=80&w=1200", titulo: "Vivienda Social - Vista Norte" } // 5
        ];

        let indiceActual = 0;

        function abrirGaleria(indice) {
            indiceActual = indice;
            actualizarModal();
            document.getElementById('modal-galeria').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Bloquea el scroll de la página de fondo
        }

        function cerrarGaleria() {
            document.getElementById('modal-galeria').style.display = 'none';
            document.body.style.overflow = 'auto'; // Devuelve el scroll
        }

        function cambiarFoto(dir) {
            indiceActual += dir;
            if (indiceActual >= fotos.length) indiceActual = 0;
            if (indiceActual < 0) indiceActual = fotos.length - 1;
            actualizarModal();
        }

        function actualizarModal() {
            const f = fotos[indiceActual];
            document.getElementById('foto-grande').src = f.url;
            document.getElementById('caption').innerText = f.titulo;
            document.getElementById('contador').innerText = (indiceActual + 1) + " / " + fotos.length;
        }

        // Teclado
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal-galeria').style.display === 'flex') {
                if (e.key === "Escape") cerrarGaleria();
                if (e.key === "ArrowRight") cambiarFoto(1);
                if (e.key === "ArrowLeft") cambiarFoto(-1);
            }
        });

        // Cerrar al hacer clic fuera de la foto
        document.getElementById('modal-galeria').onclick = function(e) {
            if (e.target === this) cerrarGaleria();
        };
    </script>

</body>
</html>
